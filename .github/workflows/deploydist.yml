name: DeployDist
# on: [push,workflow_dispatch]
on:
    push:
        branches:
            - main
            - 'feature/**'
        paths-ignore:
            - '/.github/workflows/*'
            - README.md
    workflow_dispatch:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Get code
              uses: actions/checkout@v6
            #   run: |
            #      echo "cloning repo.."
            #      echo "${{toJson(github)}}"
            #      git clone https://github.com/${{github.repository}}.git
            - name: Intsall Node 20
              uses: actions/setup-node@v6
              with:
                node-version: 20
            - name: print node version
              run: node -v
            - name: Cache dependencies
              uses: actions/cache@v4
              with:
                path: ~/.npm
                key: ${{ runner.os }} -node-${{ hashFiles('**/package-lock.json')}}

            - name: Install dependencies
              run: npm ci
            - name: Run test
              run: npm run test
    deploy:
        needs: test
        runs-on: ubuntu-latest
        steps:
            - name: Get code
              uses: actions/checkout@v4
            - name: install node
              uses: actions/setup-node@v4
              with:
                node-version : 20
            - name: Cache dependencies
              uses: actions/cache@v4
              with:
                path: ~/.npm
                key: ${{ runner.os }} -node-${{ hashFiles('**/package-lock.json')}}
            - name: Install Dependencies
              run: npm ci
            - name: Build Project
              run: npm run build
            - name: Deploying
              run: echo "Deploy Successfull"



              

    
